# Root-level docker-compose.yml for easier access
# This file references the main docker-compose.yml in the deploy/ folder
# 
# Usage:
#   docker-compose up -d
#   docker-compose down
#   docker-compose logs -f
#
# For production, use:
#   docker-compose -f deploy/docker-compose.prod.yml up -d

version: '3.8'

# Include the main docker-compose configuration
# Note: This uses the extends feature, but for better compatibility,
# we'll just reference the deploy folder directly
# 
# To use this file, run from project root:
#   docker-compose -f docker-compose.yml up -d
#
# Or use the deploy folder directly:
#   cd deploy && docker-compose up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "listen_addresses=*", "-c", "port=5432"]
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - core-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d postgres"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - core-network
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-core_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - core-network
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file:
      - ./deploy/.env
    environment:
      DATABASE_URL: postgresql+psycopg://core_user:${POSTGRES_PASSWORD}@postgres:5432/core_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-30}
      GOSU_API_URL: ${GOSU_API_URL:-https://apis.gosu.vn}
      GOSU_APP_ID: ${GOSU_APP_ID:-UA}
      GOSU_SECRET: ${GOSU_SECRET}
      DEBUG: ${DEBUG:-True}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      SSL_VERIFY: ${SSL_VERIFY:-True}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - core-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/healthz')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ./deploy/.env
    environment:
      # BACKEND_URL: Next.js proxy /api/v1 -> backend (same Docker network) - login từ máy khác hoạt động
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_USE_API_PROXY: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - core-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  core-network:
    driver: bridge

